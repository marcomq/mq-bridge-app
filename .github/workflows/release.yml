# .github/workflows/release.yml
name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

env:
  IMAGE_NAME: ${{ github.repository }}
  # Bump this number whenever you change the compiler toolchain, cmake config,
  # or rdkafka features. This invalidates the GHA Docker layer cache so stale
  # x86_64 rdkafka build artifacts don't bleed into the arm64 build.
  DOCKER_CACHE_VERSION: 2

jobs:
  test:
    name: Cargo Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libssl-dev pkg-config zlib1g-dev

      - name: Run cargo test
        run: cargo test --all-targets

  publish:
    name: Build and Publish Docker Image
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract version from Cargo.toml
        id: get_version
        run: |
          echo "VERSION=$(sed -n 's/^version = "\([^"]*\)".*/\1/p' Cargo.toml | head -n1)" >> $GITHUB_OUTPUT

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ env.IMAGE_NAME }}:${{ steps.get_version.outputs.VERSION }}
            ghcr.io/${{ env.IMAGE_NAME }}:latest
          build-args: |
            CACHE_BUST=${{ env.DOCKER_CACHE_VERSION }}
          cache-from: type=gha,scope=build-v${{ env.DOCKER_CACHE_VERSION }}
          cache-to: type=gha,mode=max,scope=build-v${{ env.DOCKER_CACHE_VERSION }}