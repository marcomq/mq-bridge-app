name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Tag name (e.g. v1.0.0)'
        required: true

env:
  IMAGE_NAME: ${{ github.repository }}
  IBM_MQ_SHA256: faadc63c7a0d7ae24a85cdb0ed5f0669a61c5f70123bbd3cea3c540c77eea855

jobs:
  metadata:
    name: Resolve Release Metadata
    runs-on: ubuntu-latest
    outputs:
      cargo_version: ${{ steps.meta.outputs.cargo_version }}
      release_tag: ${{ steps.meta.outputs.release_tag }}
      is_prerelease: ${{ steps.meta.outputs.is_prerelease }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve tag and version
        id: meta
        shell: bash
        run: |
          RELEASE_TAG="${{ inputs.tag_name || github.ref_name }}"
          # Extract version from Cargo.toml, handling potential indentation
          CARGO_VERSION="$(sed -n 's/^[[:space:]]*version = "\([^"]*\)".*/\1/p' Cargo.toml | tr -d '\r' | head -n1)"
          # Fallback to the release tag (without 'v' prefix) if Cargo.toml version extraction fails
          if [ -z "$CARGO_VERSION" ]; then
            CARGO_VERSION="${RELEASE_TAG#v}"
          fi
          if [[ "$RELEASE_TAG" == *rc* || "$RELEASE_TAG" == *alpha* || "$RELEASE_TAG" == *beta* ]]; then
            IS_PRERELEASE=true
          else
            IS_PRERELEASE=false
          fi
          echo "release_tag=$RELEASE_TAG" >> "$GITHUB_OUTPUT"
          echo "cargo_version=$CARGO_VERSION" >> "$GITHUB_OUTPUT"
          echo "is_prerelease=$IS_PRERELEASE" >> "$GITHUB_OUTPUT"

  test:
    name: Cargo Test
    runs-on: ubuntu-latest
    needs: metadata
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libssl-dev pkg-config zlib1g-dev cmake libcurl4-openssl-dev

      - name: Run cargo test
        run: cargo test --all-targets

  release:
    name: Create GitHub Release
    needs: [metadata, test]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      release_id: ${{ steps.create_release.outputs.id }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.metadata.outputs.release_tag }}
          name: Release ${{ needs.metadata.outputs.release_tag }}
          body: See the project README for details on this release.
          draft: false
          prerelease: ${{ needs.metadata.outputs.is_prerelease == 'true' }}

  build-release:
    name: Build CLI asset for ${{ matrix.target }}
    needs: [metadata, release]
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary_name: mq-bridge-cli
            use_cross: true
          - os: macos-latest
            target: aarch64-apple-darwin
            binary_name: mq-bridge-cli
            use_cross: false
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary_name: mq-bridge-cli.exe
            use_cross: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          target: ${{ matrix.target }}

      - name: Install Cross
        if: matrix.use_cross
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install cmake pkg-config openssl@3

      - name: Build binary
        shell: bash
        run: |
          if [ "${{ matrix.use_cross }}" == "true" ]; then
            cross build --release --target ${{ matrix.target }}
          else
            cargo build --release --target ${{ matrix.target }}
          fi
          
          # Rename binary from default mq-bridge-app to mq-bridge-cli
          if [ "$RUNNER_OS" == "Windows" ]; then
            mv "target/${{ matrix.target }}/release/mq-bridge-app.exe" "target/${{ matrix.target }}/release/${{ matrix.binary_name }}"
          else
            mv "target/${{ matrix.target }}/release/mq-bridge-app" "target/${{ matrix.target }}/release/${{ matrix.binary_name }}"
          fi

      - name: Package artifacts
        shell: bash
        run: |
          ASSET_NAME="mq-bridge-cli-${{ matrix.target }}"
          mkdir staging
          cp "target/${{ matrix.target }}/release/${{ matrix.binary_name }}" staging/
          cp LICENSE README.md staging/
          if [ "$RUNNER_OS" == "Windows" ]; then
            7z a "${ASSET_NAME}.zip" ./staging/*
            echo "ASSET_PATH=${ASSET_NAME}.zip" >> "$GITHUB_ENV"
          else
            tar -czf "${ASSET_NAME}.tar.gz" -C staging .
            echo "ASSET_PATH=${ASSET_NAME}.tar.gz" >> "$GITHUB_ENV"
          fi

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.metadata.outputs.release_tag }}
          files: ${{ env.ASSET_PATH }}

  build-linux-amd64:
    name: Build docker linux/amd64
    needs: [metadata, test]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push mq-bridge-app (amd64)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          target: final
          push: true
          tags: |
            ghcr.io/${{ env.IMAGE_NAME }}:amd64
            ghcr.io/${{ env.IMAGE_NAME }}:${{ needs.metadata.outputs.cargo_version }}-amd64
          build-args: |
            CACHE_BUST=${{ needs.metadata.outputs.cargo_version }}
            ENABLE_IBM_MQ=false
          cache-from: type=gha,scope=build-amd64-v${{ needs.metadata.outputs.cargo_version }}
          cache-to: type=gha,mode=max,scope=build-amd64-v${{ needs.metadata.outputs.cargo_version }}

  build-linux-arm64:
    name: Build docker linux/arm64
    needs: [metadata, test]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push mq-bridge-app (arm64)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/arm64
          target: final
          push: true
          tags: |
            ghcr.io/${{ env.IMAGE_NAME }}:arm64
            ghcr.io/${{ env.IMAGE_NAME }}:${{ needs.metadata.outputs.cargo_version }}-arm64
          build-args: |
            CACHE_BUST=${{ needs.metadata.outputs.cargo_version }}
            ENABLE_IBM_MQ=false
          cache-from: type=gha,scope=build-arm64-v${{ needs.metadata.outputs.cargo_version }}
          cache-to: type=gha,mode=max,scope=build-arm64-v${{ needs.metadata.outputs.cargo_version }}

  build-linux-amd64-ibm-mq:
    name: Build docker linux/amd64 + IBM MQ
    needs: [metadata, test]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push mq-bridge-app (amd64 + IBM MQ)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          target: final
          push: true
          tags: |
            ghcr.io/${{ env.IMAGE_NAME }}:amd64-ibm-mq
            ghcr.io/${{ env.IMAGE_NAME }}:${{ needs.metadata.outputs.cargo_version }}-amd64-ibm-mq
          build-args: |
            CACHE_BUST=${{ needs.metadata.outputs.cargo_version }}
            ENABLE_IBM_MQ=true
            IBM_MQ_SHA256=${{ env.IBM_MQ_SHA256 }}
          cache-from: type=gha,scope=build-amd64-ibm-mq-v${{ needs.metadata.outputs.cargo_version }}
          cache-to: type=gha,mode=max,scope=build-amd64-ibm-mq-v${{ needs.metadata.outputs.cargo_version }}

  publish-manifest:
    name: Push multi-arch manifest
    needs: [metadata, build-linux-amd64, build-linux-arm64]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push multi-arch manifest
        run: |
          docker buildx imagetools create \
            --tag ghcr.io/${{ env.IMAGE_NAME }}:${{ needs.metadata.outputs.cargo_version }} \
            --tag ghcr.io/${{ env.IMAGE_NAME }}:latest \
            ghcr.io/${{ env.IMAGE_NAME }}:${{ needs.metadata.outputs.cargo_version }}-amd64 \
            ghcr.io/${{ env.IMAGE_NAME }}:${{ needs.metadata.outputs.cargo_version }}-arm64

  publish-amd64-ibm-mq-tag:
    name: Push amd64 IBM MQ aliases
    needs: [metadata, build-linux-amd64-ibm-mq]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push IBM MQ image aliases
        run: |
          docker buildx imagetools create \
            --tag ghcr.io/${{ env.IMAGE_NAME }}:ibm-mq \
            --tag ghcr.io/${{ env.IMAGE_NAME }}:latest-ibm-mq \
            ghcr.io/${{ env.IMAGE_NAME }}:${{ needs.metadata.outputs.cargo_version }}-amd64-ibm-mq

  build-tauri-release:
    name: Build Tauri bundle for ${{ matrix.name }}
    needs: [metadata, release]
    runs-on: ${{ matrix.platform }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macos
            platform: macos-latest
            rust_targets: aarch64-apple-darwin
            tauri_args: --target aarch64-apple-darwin --config tauri.release.conf.json
          - name: windows
            platform: windows-latest
            rust_targets: ''
            tauri_args: --config tauri.release.conf.json
          - name: linux
            platform: ubuntu-22.04
            rust_targets: ''
            tauri_args: --config tauri.release.conf.json
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_targets }}

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        run: npm ci

      - name: Enable Tauri bundling for release builds
        shell: bash
        run: |
          node <<'EOF'
          const fs = require('fs');
          const path = 'crates/desktop/tauri.release.conf.json';
          const config = JSON.parse(fs.readFileSync('crates/desktop/tauri.conf.json', 'utf8'));
          // In Tauri v2, productName is a top-level property
          config.productName = "mq-bridge";
          fs.writeFileSync(path, JSON.stringify(config, null, 2) + '\n');
          EOF

      - name: Build and upload Tauri bundle
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: crates/desktop
          releaseId: ${{ needs.release.outputs.release_id }}
          tagName: ${{ needs.metadata.outputs.release_tag }}
          uploadPlainBinary: false
          args: ${{ matrix.tauri_args }}

  publish-crates-io:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    needs: release
    environment: release
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Publish to crates.io
        shell: bash
        run: |
          # Attempt to publish core; ignore errors (e.g. if 0.2.0 is already live)
          cargo publish -p mq-bridge-app-core || true
          # Then publish the CLI crate
          cargo publish -p mq-bridge-app
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
