<!DOCTYPE html>
<html>
<head>
    <title>MQ Bridge Configuration</title>
    <meta charset="utf-8">
    <link rel="icon" type="image/x-icon" href="/favicon.svg">
    <link rel="stylesheet" href="/bootstrap.min.css">
    <style> .nav-tabs { cursor: pointer; } </style>
    <script src="/vanilla-schema-forms.js"></script>
    <script src="/routes.js"></script>
    <script src="/consumers.js"></script>
    <script src="/publishers.js"></script>
</head>
<body>
    <div class="container mt-4 pb-5">
        <pre style="line-height: 1.4; font-size: 20px;">
      ┌────── mq-bridge-configuration ──────┐
──────┴─────────────────────────────────────┴──────</pre>

        <ul class="nav nav-tabs mb-4" id="mainTabs" role="tablist">
            <li class="nav-item"><a class="nav-link" id="tab-routes" data-bs-toggle="tab" href="#content-routes">Routes</a></li>
            <li class="nav-item"><a class="nav-link" id="tab-consumers" data-bs-toggle="tab" href="#content-consumers">Consumers</a></li>
            <li class="nav-item"><a class="nav-link" id="tab-publishers" data-bs-toggle="tab" href="#content-publishers">Publishers</a></li>
            <li class="nav-item"><a class="nav-link" id="tab-config" data-bs-toggle="tab" href="#content-config">App Config</a></li>
        </ul>

        <div class="tab-content">
            <div class="tab-pane fade" id="content-routes"><div id="routes-container"></div></div>
            <div class="tab-pane fade" id="content-consumers"><div id="consumers-container"></div></div>
            <div class="tab-pane fade" id="content-publishers"><div id="publishers-container"></div></div>
            <div class="tab-pane fade" id="content-config">
                <div id="form-container"></div>
                <div id="form-actions" class="d-flex gap-2 mt-3" style="display: none;">
                    <button id="js-submit" class="btn btn-primary">Save Configuration</button>
                    <button id="js-show-json" class="btn btn-outline-secondary" type="button" title="Show current configuration as JSON" data-bs-toggle="modal" data-bs-target="#jsonPreviewModal">
                        {?}
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- JSON Preview Modal -->
    <div class="modal fade" id="jsonPreviewModal" tabindex="-1" aria-labelledby="jsonPreviewModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-lg modal-dialog-scrollable">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="jsonPreviewModalLabel">Current Configuration (JSON)</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <pre><code id="json-output"></code></pre>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        window.addEventListener('load', async () => {
            const config = await (await fetch('/config')).json();
            const schema = await (await fetch('/schema.json')).json();
            
            // Global helper for saving configuration
            window.saveConfig = async (silent = false) => {
                try {
                    const response = await fetch('/config', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(window.appConfig)
                    });
                    if (!response.ok) {
                        const text = await response.text();
                        throw new Error(text);
                    }
                    if (!silent) alert("Configuration saved successfully!");
                    return true;
                } catch (e) {
                    alert("Error saving: " + e.message);
                    return false;
                }
            };

            // Global state for saving
            window.appConfig = config;
            
            // Settings Tab (Original global form)
            if (window.initSettings) initSettings(config, schema);
            
            // Initialize dynamic tabs
            document.getElementById('tab-routes').addEventListener('shown.bs.tab', () => {
                window._mqb_active_tab = 'routes';
                if (window.initRoutes) initRoutes(config, schema);
            });
            document.getElementById('tab-consumers').addEventListener('shown.bs.tab', () => {
                window._mqb_active_tab = 'consumers';
                if (window.initConsumers) initConsumers(config, schema);
            });
            document.getElementById('tab-publishers').addEventListener('shown.bs.tab', () => {
                window._mqb_active_tab = 'publishers';
                if (window.initPublishers) initPublishers(config, schema);
            });

            // Hash-based navigation
            const tabMap = {
                '#routes': 'tab-routes',
                '#consumers': 'tab-consumers',
                '#publishers': 'tab-publishers',
                '#config': 'tab-config'
            };

            // Function to update hash when tab is shown
            const updateHash = (tabId) => {
                const hash = Object.keys(tabMap).find(key => tabMap[key] === tabId);
                if (hash) {
                    history.replaceState(null, null, hash);
                }
            };

            // Add hash update listeners to all main tabs
            Object.values(tabMap).forEach(tabId => {
                document.getElementById(tabId).addEventListener('shown.bs.tab', () => {
                    updateHash(tabId);
                });
            });

            // Handle hash changes (back/forward navigation)
            window.addEventListener('hashchange', () => {
                const hash = window.location.hash;
                if (hash && tabMap[hash]) {
                    const tabEl = document.getElementById(tabMap[hash]);
                    if (tabEl) {
                        bootstrap.Tab.getOrCreateInstance(tabEl).show();
                    }
                }
            });

            // Handle initial tab based on URL hash or default
            const hash = window.location.hash;
            let defaultTabId;
            if (hash && tabMap[hash]) {
                defaultTabId = tabMap[hash];
            } else {
                defaultTabId = `tab-${config.default_tab || 'routes'}`;
            }
            const triggerEl = document.getElementById(defaultTabId) || document.getElementById('tab-routes');
            bootstrap.Tab.getOrCreateInstance(triggerEl).show();
        });
    </script>
</body>
</html>
