<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Background -->
  <rect width="64" height="64" rx="10" fill="#ececec"/>

  <!-- Box -->
  <rect x="8" y="8" width="48" height="44"
        fill="none"
        stroke="#111111"
        stroke-width="3"
        stroke-linecap="square"/>

  <!-- Bottom connector -->
  <line x1="32" y1="52" x2="32" y2="62"
        stroke="#111111"
        stroke-width="3"
        stroke-linecap="square"/>

  <!-- Bottom base line -->
  <line x1="18" y1="62" x2="46" y2="62"
        stroke="#111111"
        stroke-width="3"
        stroke-linecap="square"/>

  <!-- Text -->
  <text x="32" y="30"
        text-anchor="middle"
        dominant-baseline="middle"
        font-family="ui-monospace, SFMono-Regular, SF Mono, Menlo, Consolas, Liberation Mono, monospace"
        font-size="32"
        fill="#111111">mq</text>
</svg>