<!DOCTYPE html>
<html class="wa-theme-default wa-palette-default wa-brand-blue">
<head>
    <title>MQ Bridge Configuration</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="/static/favicon.svg">

    <link rel="stylesheet" href="/static/vendor/webawesome/webawesome.bundle.css" />
    <link rel="stylesheet" href="/static/style.css" />
    <script type="module" src="/static/vendor/webawesome/webawesome.bundle.js"></script>
    <script>
        (() => {
            const systemDark = window.matchMedia('(prefers-color-scheme: dark)');
            const applyColorScheme = (event = systemDark) => {
                const isDark = event.matches;
                document.documentElement.classList.toggle('wa-dark', isDark);
                document.documentElement.dataset.theme = isDark ? 'dark' : 'light';
            };

            applyColorScheme();
            systemDark.addEventListener('change', applyColorScheme);
            window.applyColorScheme = applyColorScheme;
        })();
    </script>

    <script src="/static/vendor/split/split.min.js"></script>
    <script src="/static/vanilla-schema-forms.js"></script>
</head>
<body>
    <div id="app"></div>
    <script type="module" src="/ui/src/legacy-runtime.ts"></script>
    <script type="module" src="/ui/src/main.ts"></script>
</body>
</html>
