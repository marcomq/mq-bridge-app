[package]
name = "mq-bridge-app"
version = "0.1.2"
edition = "2021"
authors = ["Marco Mengelkochs"]
repository = "https://github.com/marcomq/mq-bridge-app"
license = "MIT"
description = "A message queue bridge application written in Rust, designed to connect different messaging systems like RabbitMQ, Kafka, and NATS."
readme = "README.md"
keywords = ["messaging", "kafka", "nats", "amqp", "cqrs"]
categories = ["asynchronous", "network-programming"]

[[bin]]
name = "mq-bridge-app"
path = "src/main.rs"

[profile.release]
# Link-Time Optimization.
# lto = true
# Abort on panic to reduce binary size.
panic = "abort"

[profile.release-with-lto]
inherits = "release"
lto = true
strip = true        


[dependencies]
# mq-bridge = { path = "../mq-bridge", features = ["schema"] }
mq-bridge = { version="0.2.7", features = ["schema"] }

config = { version = "0.15", features = ["yaml"] }
dotenvy = "0.15"
serde = { version = "1.0", features = ["derive"] }
shellexpand = "3.1"
serde_yaml_ng = "0.10.0"

# Async runtime
tokio = { version = "1", features = ["rt-multi-thread", "macros", "signal", "tracing"] }
clap = { version = "4.5", features = ["derive"] }

# Error handling
anyhow = "1.0"

# Logging & Tracing
tracing = "0.1.44"
tracing-subscriber = { version = "0.3", features = ["json", "env-filter"] }

# Metrics
metrics = { version = "0.24" }
metrics-exporter-prometheus = "0.18.1"
schemars = "1"
serde_json = "1.0"

[features]
default = ["full"]
integration-test = []
ibm-mq = ["mq-bridge/ibm-mq"]
full = ["mq-bridge/full"]
middleware = ["mq-bridge/middleware"]
mongodb = ["mq-bridge/mongodb"]
http = ["mq-bridge/http"]
kafka = ["mq-bridge/kafka"]
aws = ["mq-bridge/aws"]
nats = ["mq-bridge/nats"]
mqtt = ["mq-bridge/mqtt"]
zeromq = ["mq-bridge/zeromq"]
sled = ["mq-bridge/sled"]
grpc = ["mq-bridge/grpc"]
amqp = ["mq-bridge/amqp"]
