[package]
name = "mq-bridge-app"
version = "0.1.1"
edition = "2021"
repository = "https://github.com/marcomq/mq-bridge-app"
license = "MIT"
description = "A message queue bridge application written in Rust, designed to connect different messaging systems like RabbitMQ, Kafka, and NATS."
readme = "README.md"
keywords = ["messaging", "kafka", "nats", "amqp", "cqrs"]
categories = ["asynchronous", "network-programming"]

[[bin]]
name = "mq-bridge-app"
path = "src/main.rs"

[profile.release]
# Link-Time Optimization.
# lto = true
# Abort on panic to reduce binary size.
panic = "abort"

[profile.release-with-lto]
inherits = "release"
lto = true


[dependencies]
mq-bridge = { git = "https://github.com/marcomq/mq-bridge", branch = "dev", features = ["schema"] }
# mq-bridge = { version="0.2.2", features = ["schema"] }

config = { version = "0.15" }
dotenvy = "0.15"
serde = { version = "1.0", features = ["derive"] }
serde_yaml_ng = "0.10.0"

# Async runtime
tokio = { version = "1", features = ["rt-multi-thread", "macros", "signal", "tracing"] }
clap = { version = "4.5", features = ["derive"] }

# Error handling
anyhow = "1.0.100"

# Logging & Tracing
tracing = "0.1.44"
tracing-subscriber = { version = "0.3", features = ["json", "env-filter"] }

# Metrics
metrics = { version = "0.24" }
metrics-exporter-prometheus = "0.18.1"
actix-web = { version = "4.12", features = ["rustls-0_23"] }
schemars = "1"
serde_json = "1.0"
async-trait = "0.1.89"

[features]
default = ["full"]
integration-test = []
ibm-mq = ["mq-bridge/ibm-mq"]
full = ["mq-bridge/full"]
middleware = ["mq-bridge/middleware"]
mongodb = ["mq-bridge/mongodb"]
http = ["mq-bridge/http"]
kafka = ["mq-bridge/kafka"]
aws = ["mq-bridge/aws"]
nats = ["mq-bridge/nats"]
mqtt = ["mq-bridge/mqtt"]
