# Sample MCP server configuration using Streamable HTTP (SSE).
# This allows the MCP server to be accessed remotely via HTTP.

log_level: debug
logger: json

mcp:
  enabled: true
  transport: streamable_http
  bind: "0.0.0.0:3000"
  # Optional: Protect the endpoint with an API Key
  auth:
    api_key:
      header: "X-API-Key"
      key: "change-me-to-something-secure"

publishers:
  # Creates a tool named `publish_to_kafka_orders`
  kafka_orders:
    description: "Submits new orders to the Kafka orders topic."
    kafka:
      url: "localhost:9092"
      topic: "orders"

  # Creates a tool named `publish_to_app_log`
  app_log:
    description: "Appends entries to a local log file."
    file:
      path: "/tmp/mcp_app.log"
      format: "text"

consumers:
  # Creates a tool named `consume_from_kafka_notifications`
  kafka_notifications:
    description: "Reads notifications from Kafka."
    kafka:
      url: "localhost:9092"
      topic: "notifications"
      group_id: "mcp-agent-group"
      # Optional: Consumer specific options
      consumer_options:
        - ["auto.offset.reset", "latest"]