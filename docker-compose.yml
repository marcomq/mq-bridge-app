services:
  mq-bridge:
    build:
      context: .
      dockerfile: Dockerfile
      target: final
    container_name: mq-bridge
    ports:
      - "9091:9091" # Prometheus metrics
      - "9090:9090" # UI
    # environment:
      # The application can read its configuration from the mounted config file.
      # You might still need some environment variables, e.g., passwords
    volumes:
      - ./sled_data:/data # Persist deduplication database
      - ./config/config.yml:/etc/mq-bridge/config.yml:ro # Mount the configuration file into the container

  mq-bridge-mcp:
    build:
      context: .
      dockerfile: Dockerfile
      target: mcp-final
    container_name: mq-bridge-mcp
    ports:
      - "3000:3000" # Default SSE port for MCP
    volumes:
      - ./config/config.yml:/app/config.yml:ro # Mount a config for MCP. You might want a separate one.
    # The MCP server can also be run in stdio mode, which doesn't need ports.
    # To run in stdio mode, you would override the command in your docker-compose.override.yml
    # command: ["--config", "/app/config.yml", "--transport", "stdio"]
